limit_req_zone $binary_remote_addr zone=perip:15m rate=3r/s;
limit_req_zone $server_name zone=perserver:20m rate=10r/s;
server {
    listen       80;
    listen  [::]:80;
    server_name  localhost;
    limit_req zone=perip burst=20 nodelay;
    limit_req zone=perserver burst=30 nodelay;

    #access_log  /var/log/nginx/host.access.log  main;
    client_max_body_size 120m;

    location / {
        root   /usr/share/nginx/html;
        try_files $uri $uri/ /index.html;
        index  index.html;
    }
    location /api/{
        proxy_pass http://backend:4000;
    }
    location /my-uploads/{
        alias /my-app/my-uploads/;
    }
    location /socket.io/{
    proxy_pass http://backend:4000/;
    # proxy_http_version 1.1; # before version 1.29.7
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    }

    #error_page  404              /404.html;

    # redirect server error pages to the static page /50x.html
    #
    error_page   500 502 503 504  /50x.html;
    location = /50x.html {
        root   /usr/share/nginx/html;
    }

    # proxy the PHP scripts to Apache listening on 127.0.0.1:80
    #
    #location ~ \.php$ {
    #    proxy_pass   http://127.0.0.1;
    #}

    # pass the PHP scripts to FastCGI server listening on 127.0.0.1:9000
    #
    #location ~ \.php$ {
    #    root           html;
    #    fastcgi_pass   127.0.0.1:9000;
    #    fastcgi_index  index.php;
    #    fastcgi_param  SCRIPT_FILENAME  /scripts$fastcgi_script_name;
    #    include        fastcgi_params;
    #}

    # deny access to .htaccess files, if Apache's document root
    # concurs with nginx's one
    #
    #location ~ /\.ht {
    #    deny  all;
    #}
}

